[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"

# Next.js plugin handles most routing, but we need correct MIME types
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Ensure static assets are served with correct MIME types
[[headers]]
  for = "/_next/static/chunks/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"

[[headers]]
  for = "/_next/static/css/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"

[[headers]]
  for = "/_next/static/media/*.woff2"
  [headers.values]
    Content-Type = "font/woff2"

[[headers]]
  for = "/_next/static/media/*.woff"
  [headers.values]
    Content-Type = "font/woff"
